<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wayne OS | Gabby's Terminal v16.0</title>
    <style>
        :root {
            --accent: #00ffff; 
            --bg: #00050a; 
            --dim: rgba(0, 255, 255, 0.15);
            --panel: rgba(0, 10, 20, 0.85);
            --glow: 0 0 20px rgba(0, 255, 255, 0.2);
        }

        * { box-sizing: border-box; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        body { background: var(--bg); color: var(--accent); font-family: 'Inter', 'Segoe UI', sans-serif; margin: 0; height: 100vh; overflow: hidden; }

        /* 背景装饰 */
        #bg-grid { position: absolute; width: 100%; height: 100%; background-image: radial-gradient(var(--dim) 1px, transparent 1px); background-size: 40px 40px; z-index: -1; }
        .bat-logo { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 400px; opacity: 0.03; pointer-events: none; animation: pulse 10s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.02; transform: translate(-50%, -50%) scale(1); } 50% { opacity: 0.05; transform: translate(-50%, -50%) scale(1.05); } }

        /* 导航栏 */
        nav {
            height: 70px; border-bottom: 1px solid var(--dim); display: flex; align-items: center; padding: 0 40px; gap: 30px;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(15px); z-index: 100;
        }
        .nav-btn { font-size: 0.7rem; letter-spacing: 3px; cursor: pointer; opacity: 0.5; padding: 10px 15px; border: 1px solid transparent; }
        .nav-btn:hover, .nav-btn.active { opacity: 1; border-color: var(--accent); background: rgba(0, 255, 255, 0.1); }

        /* 视图系统 */
        .view { display: none; height: calc(100vh - 70px); padding: 30px; grid-template-columns: 350px 1fr 350px; gap: 25px; }
        .view.active { display: grid; }

        /* 通用面板 */
        .panel { background: var(--panel); border: 1px solid var(--dim); padding: 25px; display: flex; flex-direction: column; backdrop-filter: blur(20px); box-shadow: var(--glow); border-radius: 4px; }
        h2 { font-size: 0.75rem; letter-spacing: 5px; border-bottom: 1px solid var(--dim); padding-bottom: 10px; margin: 0 0 20px 0; color: #fff; text-shadow: 0 0 5px var(--accent); }

        /* UI 组件 */
        input, select, button { background: rgba(0, 255, 255, 0.03); border: 1px solid var(--dim); color: var(--accent); padding: 12px; font-family: inherit; font-size: 0.8rem; outline: none; margin-bottom: 10px; }
        button { background: var(--accent); color: #000; font-weight: bold; cursor: pointer; border: none; letter-spacing: 1px; }
        button:hover { background: #fff; box-shadow: 0 0 20px #fff; }

        /* 沟通系统内容 */
        #chat-flow { flex: 1; overflow-y: auto; padding-right: 10px; }
        .msg { margin-bottom: 20px; font-size: 0.85rem; line-height: 1.6; }
        .msg.bw { color: var(--accent); }
        .msg.user { color: #fff; text-align: right; }
        .msg-ts { font-size: 0.6rem; opacity: 0.4; display: block; margin-bottom: 4px; }

        /* 日历矩阵 */
        #calendar-grid { grid-template-columns: 1fr; } /* 日历视图设为单列容器 */
        .cal-container { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; flex: 1; }
        .cal-cell { border: 1px solid var(--dim); padding: 10px; min-height: 110px; background: rgba(0, 255, 255, 0.01); position: relative; }
        .cal-cell.today { border-color: var(--accent); background: rgba(0, 255, 255, 0.05); }
        .cal-num { font-size: 1.1rem; font-weight: bold; opacity: 0.2; }
        .cal-mark { font-size: 0.65rem; background: rgba(0, 255, 255, 0.1); border-left: 2px solid var(--accent); padding: 2px 5px; margin-top: 5px; display: block; }

        #clock { font-size: 2.2rem; font-weight: bold; color: var(--accent); text-shadow: 0 0 10px var(--accent); }

        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); }
    </style>
</head>
<body>

<div id="bg-grid"></div>
<img src="https://upload.wikimedia.org/wikipedia/commons/c/ce/Batman_Logo.svg" class="bat-logo">

<nav>
    <div class="nav-btn active" id="btn-main" onclick="switchView('main')">COMMAND_CENTER</div>
    <div class="nav-btn" id="btn-cal" onclick="switchView('cal')">MISSION_CALENDAR</div>
    <div style="flex:1"></div>
    <div id="clock">00:00:00</div>
</nav>

<div id="view-main" class="view active">
    <section class="panel">
        <h2>MISSION_DEPLOY</h2>
        <input type="text" id="tName" placeholder="任务代号 (OBJ_NAME)...">
        <input type="date" id="tDate">
        <select id="tCycle">
            <option value="once">ONCE (单次)</option>
            <option value="1">DAILY (每日)</option>
            <option value="3">3-DAYS (3日循环)</option>
        </select>
        <button onclick="deploy()">ACTIVATE MISSION</button>
        <h2 style="margin-top:30px;">ACTIVE_LOGS</h2>
        <div id="tLogs" style="flex:1; overflow-y:auto;"></div>
    </section>

    <section style="display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center;">
        <div style="letter-spacing:10px; opacity:0.4; font-size:0.8rem;">WAYNE ENTERPRISE</div>
        <div style="margin-top:20px; font-size:0.7rem; color:var(--accent); border:1px solid var(--accent); padding:5px 15px;">GABBY'S NEURAL LINK : ONLINE</div>
    </section>

    <section class="panel">
        <h2>COMMUNICATIONS</h2>
        <div id="chat-flow">
            <div class="msg bw">
                <span class="msg-ts">SYSTEM START</span>
                Bruce: 链接已重置。Gabby，所有战术协议已准备就绪。
            </div>
        </div>
        <div style="display:flex; gap:8px; border-top:1px solid var(--dim); padding-top:15px;">
            <input type="text" id="uInput" placeholder="汇报或询问..." style="flex:1; margin:0;" onkeypress="if(event.key==='Enter') send()">
            <button onclick="send()" style="margin:0; padding:0 20px;">SEND</button>
        </div>
    </section>
</div>

<div id="view-cal" class="view">
    <section class="panel" style="grid-column: 1 / 4;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2>MONTHLY_TACTICAL_PROJECTION</h2>
            <div style="font-size:0.7rem;">APRIL 2026</div>
        </div>
        <div class="cal-container" id="calContainer"></div>
    </section>
</div>

<script>
    let missions = [];

    // 1. 视图切换逻辑
    function switchView(mode) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        
        if(mode === 'main') {
            document.getElementById('view-main').classList.add('active');
            document.getElementById('btn-main').classList.add('active');
        } else {
            document.getElementById('view-cal').classList.add('active');
            document.getElementById('btn-cal').classList.add('active');
            renderCalendar();
            post('bw', "Bruce: 正在扫描时间轴，Gabby。");
        }
    }

    // 2. 任务部署逻辑
    function deploy() {
        const name = document.getElementById('tName').value;
        const date = document.getElementById('tDate').value;
        const cycle = document.getElementById('tCycle').value;
        if(!name || !date) return;

        missions.push({ name, date, cycle });
        updateLogs();
        post('bw', `Gabby，"${name}" 任务已同步至全息日历。`);
        document.getElementById('tName').value = "";
    }

    function updateLogs() {
        const log = document.getElementById('tLogs');
        log.innerHTML = missions.map(m => `
            <div style="border-left:2px solid var(--accent); padding:10px; margin-bottom:10px; background:rgba(0,255,255,0.03); font-size:0.8rem;">
                <strong>${m.name}</strong><br><small>${m.date} | ${m.cycle}</small>
            </div>
        `).join('');
    }

    // 3. 日历渲染逻辑
    function renderCalendar() {
        const container = document.getElementById('calContainer');
        container.innerHTML = "";
        const now = new Date();
        const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
        const today = now.getDate();

        for(let i=1; i<=daysInMonth; i++) {
            const dateStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
            const cellMissions = missions.filter(m => m.date === dateStr);
            
            const cell = document.createElement('div');
            cell.className = `cal-cell ${i === today ? 'today' : ''}`;
            cell.innerHTML = `
                <span class="cal-num">${i}</span>
                ${cellMissions.map(m => `<span class="cal-mark">${m.name}</span>`).join('')}
            `;
            container.appendChild(cell);
        }
    }

    // 4. 增强型沟通系统 (Gabby 专用)
    function send() {
        const input = document.getElementById('uInput');
        const text = input.value.trim();
        if(!text) return;

        post('user', text);
        input.value = "";

        setTimeout(() => {
            let res = "收到，Gabby。正在处理数据。";
            const t = text.toLowerCase();
            if(t.includes("累") || t.includes("休息") || t.includes("不舒服")) {
                res = "Gabby，监测到你的疲劳值上升。这是指令：立刻休息，阿福会盯着后续的。";
            } else if(t.includes("完成") || t.includes("汇报") || t.includes("调查")) {
                res = "做得好，Gabby。这些线索对哥谭的案件至关重要。";
            } else if(t.includes("晚安") || t.includes("再见")) {
                res = "晚安，Gabby。哥谭的明天也需要你。";
            }
            post('bw', `Bruce: ${res}`);
        }, 1200);
    }

    function post(type, text) {
        const flow = document.getElementById('chat-flow');
        const d = document.createElement('div');
        d.className = `msg ${type}`;
        d.innerHTML = `<span class="msg-ts">${new Date().toLocaleTimeString()}</span>${text}`;
        flow.appendChild(d);
        flow.scrollTop = flow.scrollHeight;
    }

    // 初始化
    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
    document.getElementById('tDate').valueAsDate = new Date();
</script>

</body>
</html>
