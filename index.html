<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bat-Computer | Neural Link</title>
    <style>
        :root {
            --accent: #00ff41;
            --bg: #030303;
            --dim-border: rgba(0, 255, 65, 0.2);
            --font-main: 'Segoe UI', 'Consolas', monospace;
        }

        body {
            background: var(--bg);
            color: var(--accent);
            font-family: var(--font-main);
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* 极简动态点阵背景 */
        #bg-canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(var(--dim-border) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
        }

        /* 呼吸灯效果的蝙蝠标志 */
        .bat-logo {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            opacity: 0.05;
            filter: invert(1);
            pointer-events: none;
        }

        #os-interface {
            width: 95%;
            max-width: 1200px;
            height: 85vh;
            display: grid;
            grid-template-columns: 320px 1fr 320px;
            gap: 20px;
            z-index: 10;
        }

        .panel {
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid var(--accent);
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.1);
            backdrop-filter: blur(8px);
        }

        h2 { font-size: 0.7rem; letter-spacing: 4px; margin: 0 0 15px 0; opacity: 0.7; border-bottom: 1px solid var(--dim-border); padding-bottom: 5px; }

        /* 任务部署区样式 */
        .config-row { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
        input, select, button {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 10px;
            font-family: inherit;
            outline: none;
            font-size: 0.8rem;
        }
        button { background: var(--accent); color: #000; font-weight: bold; cursor: pointer; border: none; }
        button:hover { background: #fff; box-shadow: 0 0 15px #fff; }

        .task-list { flex: 1; overflow-y: auto; }
        .task-entry {
            border-left: 2px solid var(--accent);
            padding: 10px;
            margin-bottom: 10px;
            background: rgba(0, 255, 65, 0.05);
            font-size: 0.8rem;
        }

        /* 沟通系统 (Chat System) */
        #chat-flow {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 15px;
            padding-right: 10px;
        }
        .message { margin-bottom: 15px; line-height: 1.5; font-size: 0.85rem; }
        .msg-bw { color: var(--accent); }
        .msg-user { color: #fff; text-align: right; }
        .msg-meta { font-size: 0.6rem; opacity: 0.4; display: block; margin-bottom: 2px; }

        /* 中间装饰 */
        .center-hud {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: none;
            background: transparent;
        }

        .status-scan {
            font-size: 0.7rem;
            text-align: center;
            opacity: 0.6;
            line-height: 2;
        }

        ::-webkit-scrollbar { width: 2px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); }
    </style>
</head>
<body>

<div id="bg-canvas"></div>
<img src="https://upload.wikimedia.org/wikipedia/commons/c/ce/Batman_Logo.svg" class="bat-logo">

<div id="os-interface">
    <section class="panel">
        <h2>MISSION_SCHEDULER</h2>
        <div class="config-row">
            <input type="text" id="taskName" placeholder="任务代号...">
            <input type="date" id="startDate">
            <select id="repeatCycle">
                <option value="once">ONCE (单次)</option>
                <option value="1">DAILY (每日)</option>
                <option value="3">3-DAYS (3日巡检)</option>
                <option value="custom">CUSTOM (自定天数)</option>
            </select>
            <input type="number" id="customInput" placeholder="天数..." style="display:none;">
            <button onclick="deployMission()">DEPLOY</button>
        </div>
        <h2>ACTIVE_LOGS</h2>
        <div class="task-list" id="taskDisplay"></div>
    </section>

    <section class="panel center-hud">
        <div class="status-scan">
            <div id="clock">00:00:00</div>
            <div>[ STATUS: ENCRYPTED ]</div>
            <div style="margin-top:20px;">
                GCPD FREQ: 142.8MHz<br>
                SATELLITE: WAYNE-SAT-4<br>
                BATMOBILE: ARMED
            </div>
        </div>
    </section>

    <section class="panel">
        <h2>COMMUNICATION_LINK</h2>
        <div id="chat-flow">
            <div class="message msg-bw">
                <span class="msg-meta">WAYNE_SECURE 02:40 AM</span>
                Bruce: 链接已激活。我在这里，你可以随时汇报进度或询问计划。
            </div>
        </div>
        <div style="display:flex; gap:5px;">
            <input type="text" id="userMsg" placeholder="输入汇报内容..." style="flex:1;" onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()" style="padding:0 15px;">SEND</button>
        </div>
    </section>
</div>

<script>
    // 模拟后台AI逻辑：布鲁斯的性格与回复倾向
    const aiBrains = {
        greetings: ["收到。", "正在听。", "讲。"],
        encouragement: ["专注。哥谭在看着我们。", "阿福也觉得你最近效率很高。", "不错。"],
        warning: ["别太拼命，凯恩。这只是个开始。", "如果你感觉到了疲惫，那就意味着你该休息了。", "不要让情绪控制你的判断。"],
        default: ["继续执行计划。", "收到，数据已同步至主板。", "我会保持监控。"]
    };

    // 初始化日期
    document.getElementById('startDate').valueAsDate = new Date();
    document.getElementById('repeatCycle').addEventListener('change', function() {
        document.getElementById('customInput').style.display = (this.value === 'custom') ? 'block' : 'none';
    });

    // 部署任务
    function deployMission() {
        const name = document.getElementById('taskName').value;
        const start = document.getElementById('startDate').value;
        const cycle = document.getElementById('repeatCycle').value;
        if(!name) return;

        const display = document.getElementById('taskDisplay');
        const div = document.createElement('div');
        div.className = 'task-entry';
        div.innerHTML = `
            <strong>OBJ: ${name}</strong><br>
            <small>START: ${start} | MODE: ${cycle}</small>
            <span style="float:right; cursor:pointer;" onclick="this.parentElement.remove()">[ELIMINATE]</span>
        `;
        display.prepend(div);
        
        // 自动触发一条布鲁斯的反馈
        postMessage('bw', `任务 "${name}" 已载入。我会盯着这个进度的。`);
        document.getElementById('taskName').value = "";
    }

    // 发送消息 (双向沟通)
    function sendMessage() {
        const input = document.getElementById('userMsg');
        const text = input.value.trim();
        if(!text) return;

        postMessage('user', text);
        input.value = "";

        // 后台AI响应逻辑
        setTimeout(() => {
            let response = "";
            if(text.includes("累") || text.includes("休")) {
                response = aiBrains.warning[Math.floor(Math.random()*aiBrains.warning.length)];
            } else if(text.includes("汇报") || text.includes("完成")) {
                response = aiBrains.encouragement[Math.floor(Math.random()*aiBrains.encouragement.length)];
            } else {
                response = aiBrains.default[Math.floor(Math.random()*aiBrains.default.length)];
            }
            postMessage('bw', `Bruce: ${response}`);
        }, 1200);
    }

    function postMessage(type, text) {
        const flow = document.getElementById('chat-flow');
        const div = document.createElement('div');
        const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        div.className = `message msg-${type}`;
        div.innerHTML = `<span class="msg-meta">${type==='bw'?'WAYNE_SECURE':'LOCAL_USER'} ${time}</span>${text}`;
        flow.appendChild(div);
        flow.scrollTop = flow.scrollHeight;
    }

    // 时钟更新
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString();
    }, 1000);
</script>

</body>
</html>
