<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wayne OS | Tactical Terminal</title>
    <style>
        :root {
            --accent: #00ff41;
            --bg: #030503;
            --dim-accent: #003311;
            --panel-bg: rgba(0, 10, 0, 0.8);
        }

        body {
            background: var(--bg);
            color: var(--accent);
            font-family: 'Consolas', 'Segoe UI', monospace;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* 蝙蝠标志背景 */
        .bat-logo {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 450px;
            opacity: 0.04;
            filter: invert(1);
            animation: pulse 6s infinite ease-in-out;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.03; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.07; transform: translate(-50%, -50%) scale(1.08); }
        }

        #terminal-layout {
            display: grid;
            grid-template-columns: 380px 1fr 350px;
            width: 100%;
            padding: 30px;
            gap: 30px;
            z-index: 1;
        }

        .panel {
            background: var(--panel-bg);
            border: 1px solid var(--dim-accent);
            padding: 20px;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(10px);
        }

        h2 { font-size: 0.75rem; text-transform: uppercase; margin: 0 0 20px 0; border-left: 3px solid var(--accent); padding-left: 10px; opacity: 0.8; }

        /* 输入组件 */
        .control-group { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
        .row { display: flex; gap: 8px; }
        input, select, button {
            background: rgba(0, 255, 65, 0.03);
            border: 1px solid var(--dim-accent);
            color: var(--accent);
            padding: 10px;
            font-size: 0.8rem;
            outline: none;
        }
        input:focus { border-color: var(--accent); }
        button { background: var(--accent); color: black; font-weight: bold; border: none; cursor: pointer; transition: 0.3s; }
        button:hover { background: #fff; box-shadow: 0 0 15px var(--accent); }

        /* 任务列表 */
        #mission-feed { flex: 1; overflow-y: auto; font-size: 0.8rem; }
        .mission-item {
            border-bottom: 1px solid var(--dim-accent);
            padding: 12px 0;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .mission-meta { font-size: 0.65rem; color: #888; margin-top: 4px; }

        /* 对话系统 */
        #chat-flow { flex: 1; overflow-y: auto; padding-right: 5px; }
        .msg { margin-bottom: 15px; font-size: 0.85rem; line-height: 1.4; }
        .msg.bw { color: var(--accent); }
        .msg.user { color: #fff; text-align: right; }
        .msg span { font-size: 0.6rem; opacity: 0.5; display: block; margin-bottom: 4px; }

        /* 隐藏步数输入框直到需要 */
        #custom-days-row { display: none; }
    </style>
</head>
<body>

    <img src="https://upload.wikimedia.org/wikipedia/commons/c/ce/Batman_Logo.svg" class="bat-logo">

    <div id="terminal-layout">
        <section class="panel">
            <h2>Mission Scheduler</h2>
            <div class="control-group">
                <input type="text" id="taskName" placeholder="任务代号 (OBJECTIVE)...">
                
                <div class="row">
                    <input type="date" id="startDate" style="flex: 1;">
                    <select id="priority">
                        <option value="NORMAL">常规</option>
                        <option value="CRITICAL">紧急</option>
                    </select>
                </div>

                <select id="freq" onchange="toggleCustomFreq()">
                    <option value="once">单次执行 (ONCE)</option>
                    <option value="1">每日循环 (DAILY)</option>
                    <option value="3">3日巡检 (3-DAY)</option>
                    <option value="custom">自定循环 (CUSTOM)</option>
                </select>

                <div id="custom-days-row" class="row">
                    <input type="number" id="customVal" placeholder="输入循环天数..." style="flex: 1;" min="1">
                </div>

                <button onclick="deploy()">DEPLOY MISSION</button>
            </div>

            <h2>Active Objectives</h2>
            <div id="mission-feed"></div>
        </section>

        <section style="display:flex; flex-direction:column; justify-content:space-between; align-items:center; border:none; padding-bottom: 50px;">
            <div style="font-size: 0.7rem; opacity: 0.5; text-align: center; letter-spacing: 5px;">
                WAYNE ENTERPRISES SECURE TERMINAL
            </div>
            <div style="text-align: center;">
                <h1 id="clock" style="font-size: 3rem; margin:0; font-weight: 100;">00:00:00</h1>
                <div id="date-display" style="opacity: 0.6;">2026.04.14</div>
            </div>
            <div style="font-size: 0.6rem; opacity: 0.3;">STATUS: ENCRYPTED // LINK: BATCAVE_MAIN</div>
        </section>

        <section class="panel">
            <h2>Comms Link (B.W.)</h2>
            <div id="chat-flow">
                <div class="msg bw">
                    <span>02:30 AM</span>
                    Bruce: 信号已加密。正在等待任务简报。
                </div>
            </div>
            <div class="row" style="margin-top: 15px;">
                <input type="text" id="userInput" placeholder="输入回复..." style="flex:1;" onkeypress="if(event.key==='Enter') sendMessage()">
                <button onclick="sendMessage()" style="padding: 0 15px;">SEND</button>
            </div>
        </section>
    </div>

<script>
    // 初始化日期
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('startDate').value = today;
    document.getElementById('date-display').innerText = today.replace(/-/g, '.');

    function toggleCustomFreq() {
        const freq = document.getElementById('freq').value;
        document.getElementById('custom-days-row').style.display = (freq === 'custom') ? 'flex' : 'none';
    }

    // 部署任务逻辑
    function deploy() {
        const name = document.getElementById('taskName').value;
        const start = document.getElementById('startDate').value;
        const freq = document.getElementById('freq').value;
        const customVal = document.getElementById('customVal').value;
        const priority = document.getElementById('priority').value;

        if(!name) return;

        let interval = freq === 'custom' ? customVal : freq;
        let freqText = freq === 'once' ? "单次" : `每 ${interval} 天`;

        const feed = document.getElementById('mission-feed');
        const item = document.createElement('div');
        item.className = 'mission-item';
        item.innerHTML = `
            <div>[${priority}] ${name}</div>
            <div class="mission-meta">起始: ${start} | 周期: ${freqText}</div>
            <div class="mission-meta" style="color:var(--accent); cursor:pointer;" onclick="this.parentElement.remove()">> 中止任务</div>
        `;
        feed.prepend(item);

        addChat('bw', `任务 "${name}" 已同步。起始时间 ${start}，我会监控进度。`);
        document.getElementById('taskName').value = "";
    }

    // 通讯系统
    const bwReplies = [
        "收到报告。保持警惕。",
        "这是必要的牺牲。继续推进。",
        "我会联络戈登局长处理外围。你继续。",
        "专注目标，凯恩。不要被恐惧左右。",
        "完成得不错。阿福为你留了备用装备。"
    ];

    function sendMessage() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if(!text) return;

        addChat('user', text);
        input.value = "";

        setTimeout(() => {
            const reply = bwReplies[Math.floor(Math.random() * bwReplies.length)];
            addChat('bw', `Bruce: ${reply}`);
        }, 1200);
    }

    function addChat(sender, text) {
        const chat = document.getElementById('chat-flow');
        const msg = document.createElement('div');
        const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        msg.className = `msg ${sender}`;
        msg.innerHTML = `<span>${time}</span>${text}`;
        chat.appendChild(msg);
        chat.scrollTop = chat.scrollHeight;
    }

    // 时钟
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB');
    }, 1000);

    // 随机主动通讯
    setInterval(() => {
        if(Math.random() > 0.8) {
            addChat('bw', "Bruce: " + bwReplies[Math.floor(Math.random() * bwReplies.length)]);
        }
    }, 45000);
</script>
</body>
</html>
