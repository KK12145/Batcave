<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bat-Computer v8.0 | Tactical OS</title>
    <style>
        :root {
            --main-color: #00ff41;
            --bg-dark: #020502;
            --panel-bg: rgba(0, 20, 0, 0.85);
            --border-glow: 0 0 10px rgba(0, 255, 65, 0.4);
            --text-dim: #008f11;
        }

        * { box-sizing: border-box; transition: all 0.3s ease; }

        body {
            background-color: var(--bg-dark);
            color: var(--main-color);
            font-family: 'Segoe UI', 'Courier New', monospace;
            margin: 0;
            height: 100vh;
            display: flex;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 50% 50%, #001a00 0%, transparent 80%),
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
                linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 100%, 100% 4px, 100% 100%;
        }

        /* 左侧导航栏 */
        nav {
            width: 80px;
            border-right: 1px solid var(--main-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            gap: 30px;
            background: rgba(0, 5, 0, 0.5);
        }

        .nav-btn {
            width: 50px;
            height: 50px;
            border: 1px solid var(--main-color);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 0.7rem;
            text-align: center;
            box-shadow: var(--border-glow);
        }

        .nav-btn:hover {
            background: var(--main-color);
            color: black;
        }

        /* 主容器 */
        main {
            flex: 1;
            display: grid;
            grid-template-columns: 300px 1fr 250px;
            gap: 15px;
            padding: 20px;
        }

        .panel {
            background: var(--panel-bg);
            border: 1px solid var(--main-color);
            box-shadow: var(--border-glow);
            padding: 15px;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(5px);
        }

        h3 {
            font-size: 0.8rem;
            margin: 0 0 10px 0;
            border-bottom: 1px solid var(--main-color);
            padding-bottom: 5px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* 日历样式 */
        #calendar-mini {
            font-size: 0.7rem;
            text-align: center;
        }
        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
        }
        .cal-day { border: 1px solid var(--text-dim); padding: 5px; }
        .cal-today { background: var(--main-color); color: black; font-weight: bold; }

        /* 当日提醒框 */
        #today-focus {
            flex: 1;
            margin-top: 15px;
            font-size: 0.9rem;
            color: #fff;
            text-shadow: 0 0 5px var(--main-color);
        }

        /* 任务管理区 */
        .task-center { grid-column: 2; }
        
        input, select {
            background: transparent;
            border: 1px solid var(--main-color);
            color: var(--main-color);
            padding: 10px;
            margin-bottom: 10px;
            outline: none;
        }

        .task-list-container {
            flex: 1;
            overflow-y: auto;
        }

        .task-card {
            border: 1px solid var(--text-dim);
            padding: 10px;
            margin-bottom: 10px;
            position: relative;
            background: rgba(0, 255, 65, 0.05);
        }

        /* 语录区 */
        .bruce-alert {
            grid-column: 3;
            font-size: 0.85rem;
            font-style: italic;
            color: #aaa;
            line-height: 1.6;
        }

        .bat-logo-bg {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 150px;
            opacity: 0.1;
            pointer-events: none;
        }

        .scan-line {
            width: 100%;
            height: 2px;
            background: rgba(0, 255, 65, 0.1);
            position: absolute;
            top: 0;
            animation: scan 3s linear infinite;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }
    </style>
</head>
<body>

<nav>
    <div class="nav-btn">MAP</div>
    <div class="nav-btn" style="background: var(--main-color); color: black;">TASK</div>
    <div class="nav-btn">DATA</div>
    <div class="nav-btn">COMMS</div>
</nav>

<main>
    <div class="side-area">
        <div class="panel">
            <h3>Tactical Calendar</h3>
            <div id="calendar-mini">
                <div id="month-name" style="margin-bottom:5px; font-weight:bold;">April 2026</div>
                <div class="cal-grid" id="cal-grid">
                    </div>
            </div>
        </div>
        
        <div class="panel" style="margin-top:15px; flex:1;">
            <h3>Today's Priority</h3>
            <div id="today-focus">
                > No critical threats detected.
            </div>
        </div>
    </div>

    <div class="panel task-center">
        <div class="scan-line"></div>
        <h3>Mission Control</h3>
        <div style="display:flex; gap:10px;">
            <input type="text" id="taskInput" placeholder="Enter objective..." style="flex:1;">
            <select id="freqSelect">
                <option value="once">ONCE</option>
                <option value="3">PER 3 DAYS</option>
                <option value="7">WEEKLY</option>
            </select>
            <button onclick="addTask()" style="background:var(--main-color); border:none; padding:0 15px; cursor:pointer; font-weight:bold;">DEPLOY</button>
        </div>
        <div class="task-list-container" id="taskList">
            </div>
    </div>

    <div class="panel bruce-alert">
        <h3>Encrypted Comms</h3>
        <div id="bruce-quote">
            "I'm watching. Don't let the city down."
        </div>
        <div style="margin-top:20px; color:var(--main-color); font-size:0.7rem;">
            [SYSTEM STATUS]<br>
            - Satellite Link: Active<br>
            - Batmobile: Fueled<br>
            - Gotham: At Risk
        </div>
    </div>
</main>

<img src="https://upload.wikimedia.org/wikipedia/commons/c/ce/Batman_Logo.svg" class="bat-logo-bg">

<script>
    const quotes = [
        "你需要变得比一个普通人更多，如果你献身于一个理想。",
        "并不是我现在的身份定义了我，而是我的所作所为。",
        "我们需要在黎明前完成这个。现在就开始。",
        "恐惧是你的朋友，但不要让它控制你。",
        "阿福已经把装备准备好了，别浪费时间。"
    ];

    // 初始化日历
    function initCalendar() {
        const grid = document.getElementById('cal-grid');
        const now = new Date();
        const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
        const today = now.getDate();

        for (let i = 1; i <= daysInMonth; i++) {
            const dayDiv = document.createElement('div');
            dayDiv.className = i === today ? 'cal-day cal-today' : 'cal-day';
            dayDiv.innerText = i;
            grid.appendChild(dayDiv);
        }
    }

    // 部署任务
    function addTask() {
        const input = document.getElementById('taskInput');
        const freq = document.getElementById('freqSelect');
        const list = document.getElementById('taskList');
        const focus = document.getElementById('today-focus');

        if (!input.value) return;

        // 创建卡片
        const card = document.createElement('div');
        card.className = 'task-card';
        card.innerHTML = `
            <strong>OBJ: ${input.value}</strong><br>
            <span style="font-size:0.7rem; color:var(--main-color)">FREQ: ${freq.options[freq.selectedIndex].text}</span>
            <span style="float:right; cursor:pointer;" onclick="this.parentElement.remove()">[ELIMINATE]</span>
        `;

        list.prepend(card);

        // 更新当日提醒（如果是第一个任务）
        focus.innerHTML = `> CURRENT: ${input.value}<br>> STATUS: ACTIVE`;

        // 更新布鲁斯语录
        document.getElementById('bruce-quote').innerText = `"${quotes[Math.floor(Math.random()*quotes.length)]}"`;

        input.value = "";
    }

    initCalendar();
</script>

</body>
</html>
