<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Wayne OS | Gabby's Advanced Command v22.0</title>
    <style>
        :root {
            --accent: #00ffff; --bg: #00050a; --dim: rgba(0, 255, 255, 0.15);
            --panel: rgba(0, 15, 30, 0.95); --glow: 0 0 25px rgba(0, 255, 255, 0.2);
            --urgent: #ff3333; --core: #ffaa00;
        }
        * { box-sizing: border-box; transition: 0.25s ease; }
        body { background: var(--bg); color: var(--accent); font-family: 'Inter', sans-serif; margin: 0; height: 100vh; overflow: hidden; }
        #bg-grid { position: absolute; width: 100%; height: 100%; background-image: radial-gradient(var(--dim) 1px, transparent 1px); background-size: 40px 40px; z-index: -1; }

        nav { height: 70px; border-bottom: 1px solid var(--dim); display: flex; align-items: center; padding: 0 30px; gap: 20px; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 100; }
        .nav-btn { font-size: 0.7rem; letter-spacing: 3px; cursor: pointer; opacity: 0.5; padding: 10px 15px; border: 1px solid transparent; text-transform: uppercase; }
        .nav-btn.active { opacity: 1; border-color: var(--accent); background: rgba(0, 255, 255, 0.05); }

        .view { display: none; height: calc(100vh - 70px); padding: 25px; grid-template-columns: 320px 1fr 350px; gap: 20px; }
        .view.active { display: grid; }
        
        .panel { background: var(--panel); border: 1px solid var(--dim); padding: 20px; display: flex; flex-direction: column; backdrop-filter: blur(20px); box-shadow: var(--glow); position: relative; }
        h2 { font-size: 0.7rem; letter-spacing: 4px; border-bottom: 1px solid var(--dim); padding-bottom: 10px; margin-bottom: 15px; color: #fff; opacity: 0.8; }

        input, select, button { background: rgba(0, 255, 255, 0.05); border: 1px solid var(--dim); color: var(--accent); padding: 10px; font-size: 0.8rem; outline: none; margin-bottom: 10px; width: 100%; }
        button { background: var(--accent); color: #000; font-weight: bold; cursor: pointer; border: none; }
        button:hover { background: #fff; box-shadow: 0 0 15px #fff; }
        
        /* 任务列表增强 */
        .task-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; overflow-y: auto; align-content: start; }
        .task-card { border: 1px solid var(--dim); border-left: 4px solid var(--accent); padding: 15px; background: rgba(0, 255, 255, 0.02); cursor: pointer; position: relative; }
        .task-card:hover { background: rgba(0, 255, 255, 0.08); border-color: var(--accent); }
        .task-card.status-done { opacity: 0.3; text-decoration: line-through; border-left-color: #666; }
        .task-card.pri-urgent { border-left-color: var(--urgent); }
        .task-card.pri-core { border-left-color: var(--core); }
        
        .del-btn { position: absolute; top: 10px; right: 10px; color: var(--urgent); font-size: 0.8rem; cursor: pointer; padding: 5px; opacity: 0.5; z-index: 5; }
        .del-btn:hover { opacity: 1; transform: scale(1.2); }
        .edit-hint { position: absolute; bottom: 5px; right: 10px; font-size: 0.5rem; opacity: 0.3; }

        #chat-flow { flex: 1; overflow-y: auto; }
        .msg { margin-bottom: 15px; font-size: 0.85rem; line-height: 1.6; }
        .msg.bw { color: var(--accent); border-left: 2px solid var(--accent); padding-left: 10px; }
        #clock { font-size: 2rem; font-weight: bold; text-shadow: 0 0 10px var(--accent); }
    </style>
</head>
<body>

<div id="bg-grid"></div>

<nav>
    <div class="nav-btn active" id="btn-main" onclick="switchView('main')">OPERATIONS</div>
    <div class="nav-btn" id="btn-cal" onclick="switchView('cal')">STRATEGIC_CALENDAR</div>
    <div style="flex:1"></div>
    <div id="clock">00:00:00</div>
</nav>

<div id="view-main" class="view active">
    <section class="panel">
        <h2 id="formTitle">MISSION_INPUT</h2>
        <input type="hidden" id="editId">
        <input type="text" id="tName" placeholder="任务代号...">
        <input type="date" id="tDate">
        <select id="tPri">
            <option value="normal">NORMAL</option>
            <option value="core">CORE</option>
            <option value="urgent">URGENT</option>
        </select>
        <select id="tCycle" onchange="toggleCustom()">
            <option value="0">SINGLE</option>
            <option value="1">DAILY</option>
            <option value="custom">CUSTOM</option>
        </select>
        <input type="number" id="tCustomVal" placeholder="循环天数..." style="display:none;">
        <button id="mainBtn" onclick="deploy()">DEPLOY / UPDATE</button>
        <button onclick="resetForm()" style="background:transparent; color:#555; border:1px solid #333; margin-top:5px;">CANCEL EDIT</button>
    </section>

    <section class="panel">
        <h2>ACTIVE_OBJECTIVES (Click to Edit / Right-Click to Complete)</h2>
        <div id="tLogs" class="task-grid"></div>
    </section>

    <section class="panel">
        <h2>COMMS_LINK</h2>
        <div id="chat-flow"></div>
        <div style="display:flex; gap:10px; border-top:1px solid var(--dim); padding-top:15px;">
            <input type="text" id="uInput" placeholder="Report..." style="flex:1; margin:0;" onkeypress="if(event.key==='Enter') send()">
            <button onclick="send()" style="margin:0; width:60px;">SEND</button>
        </div>
    </section>
</div>

<div id="view-cal" class="view">
    <section class="panel" style="grid-column: 1 / 4;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <button onclick="changeMonth(-1)" style="width:auto;">&lt;</button>
            <h2 id="calMonthDisplay" style="margin:0; border:none;"></h2>
            <button onclick="changeMonth(1)" style="width:auto;">&gt;</button>
        </div>
        <div class="cal-container" id="calContainer" style="display:grid; grid-template-columns:repeat(7, 1fr); gap:10px; flex:1;"></div>
    </section>
</div>

<script>
    const API_KEY = "sk-d10f68eb095e4a03aa4e33d697f269a0";
    const API_URL = "https://api.deepseek.com/chat/completions";
    
    let missions = JSON.parse(localStorage.getItem('gabby_v22_data')) || [];
    let currentCalDate = new Date();

    window.onload = () => { updateLogs(); post('bw', "Bruce: Gabby，控制台逻辑已升级。你可以随时修正任务细节或取消行动。"); };

    function deploy() {
        const id = document.getElementById('editId').value;
        const name = document.getElementById('tName').value;
        const date = document.getElementById('tDate').value;
        const pri = document.getElementById('tPri').value;
        const cycle = document.getElementById('tCycle').value;
        const interval = (cycle === 'custom') ? parseInt(document.getElementById('tCustomVal').value) : parseInt(cycle);

        if(!name || !date) return;

        if(id) { // 更新现有任务
            const idx = missions.findIndex(m => m.id == id);
            missions[idx] = { ...missions[idx], name, date, pri, interval };
            post('bw', `Gabby, 任务 "${name}" 的战术参数已更新。`);
        } else { // 创建新任务
            missions.push({ id: Date.now(), name, date, pri, interval, status: 'todo' });
            post('bw', `Gabby, 新目标 "${name}" 已载入。`);
        }
        
        sync();
        resetForm();
    }

    function editTask(id) {
        const m = missions.find(x => x.id == id);
        document.getElementById('editId').value = m.id;
        document.getElementById('tName').value = m.name;
        document.getElementById('tDate').value = m.date;
        document.getElementById('tPri').value = m.pri;
        document.getElementById('tCycle').value = (m.interval > 1) ? 'custom' : m.interval;
        if(m.interval > 1) {
            document.getElementById('tCustomVal').value = m.interval;
            document.getElementById('tCustomVal').style.display = 'block';
        }
        document.getElementById('formTitle').innerText = "EDITING_MISSION";
        document.getElementById('mainBtn').innerText = "UPDATE_MISSION";
    }

    function deleteTask(event, id) {
        event.stopPropagation(); // 阻止触发编辑
        if(confirm("确定撤销该行动计划？")) {
            const m = missions.find(x => x.id == id);
            missions = missions.filter(x => x.id != id);
            sync();
            post('bw', `已从数据库中抹除行动代号: ${m.name}。`);
        }
    }

    function toggleStatus(event, id) {
        event.preventDefault(); // 右键触发
        const m = missions.find(x => x.id == id);
        m.status = (m.status === 'todo') ? 'done' : 'todo';
        sync();
    }

    function resetForm() {
        document.getElementById('editId').value = "";
        document.getElementById('tName').value = "";
        document.getElementById('tDate').valueAsDate = new Date();
        document.getElementById('tPri').value = "normal";
        document.getElementById('tCycle').value = "0";
        document.getElementById('tCustomVal').style.display = 'none';
        document.getElementById('formTitle').innerText = "MISSION_INPUT";
        document.getElementById('mainBtn').innerText = "DEPLOY / UPDATE";
    }

    function sync() {
        localStorage.setItem('gabby_v22_data', JSON.stringify(missions));
        updateLogs();
        if(document.getElementById('view-cal').classList.contains('active')) renderCalendar();
    }

    function updateLogs() {
        const log = document.getElementById('tLogs');
        log.innerHTML = missions.slice().reverse().map(m => `
            <div class="task-card status-${m.status} pri-${m.pri}" onclick="editTask(${m.id})" oncontextmenu="toggleStatus(event, ${m.id})">
                <span class="del-btn" onclick="deleteTask(event, ${m.id})">[撤销]</span>
                <div style="font-size:0.6rem; opacity:0.5; margin-bottom:5px;">${m.date}</div>
                <div style="font-weight:bold; font-size:0.9rem;">${m.name}</div>
                <div style="font-size:0.6rem; margin-top:8px; opacity:0.8;">${m.interval > 0 ? 'CYCLE: '+m.interval+'D' : 'SINGLE'}</div>
                <span class="edit-hint">Click to Edit / Right-Click Done</span>
            </div>
        `).join('');
    }

    // 辅助功能：时钟、视图切换、日历、通讯 (保持原有逻辑)
    function switchView(mode) {
        document.querySelectorAll('.view, .nav-btn').forEach(el => el.classList.remove('active'));
        document.getElementById('view-' + mode).classList.add('active');
        document.getElementById('btn-' + mode).classList.add('active');
        if(mode === 'cal') renderCalendar();
    }
    function toggleCustom() { document.getElementById('tCustomVal').style.display = (document.getElementById('tCycle').value === 'custom') ? 'block' : 'none'; }
    function changeMonth(dir) { currentCalDate.setMonth(currentCalDate.getMonth() + dir); renderCalendar(); }
    function renderCalendar() {
        const container = document.getElementById('calContainer'); const display = document.getElementById('calMonthDisplay');
        container.innerHTML = ""; const y = currentCalDate.getFullYear(); const m = currentCalDate.getMonth();
        display.innerText = `${y} / ${String(m+1).padStart(2,'0')}`;
        const first = new Date(y, m, 1).getDay(); const days = new Date(y, m+1, 0).getDate();
        for(let i=0; i<first; i++) container.appendChild(document.createElement('div'));
        for(let i=1; i<=days; i++) {
            const cur = `${y}-${String(m+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
            const dayMs = missions.filter(ms => {
                const start = new Date(ms.date); const cell = new Date(cur);
                if (cur === ms.date) return true;
                if (ms.interval > 0 && cell > start) return Math.round((cell-start)/86400000) % ms.interval === 0;
                return false;
            });
            const cell = document.createElement('div'); cell.className = `cal-cell ${cur === new Date().toISOString().split('T')[0] ? 'today' : ''}`;
            cell.style.border = "1px solid var(--dim)"; cell.style.padding = "8px"; cell.style.minHeight = "80px";
            cell.innerHTML = `<span>${i}</span>${dayMs.map(ms => `<div style="font-size:0.5rem; color:var(--accent); opacity:${ms.status==='done'?0.3:1}">${ms.name}</div>`).join('')}`;
            container.appendChild(cell);
        }
    }
    async function send() {
        const input = document.getElementById('uInput'); const text = input.value.trim(); if(!text) return;
        post('user', text); input.value = ""; const id = "bw-" + Date.now(); post('bw', "Analyzing...", id);
        try {
            const res = await fetch(API_URL, {
                method: "POST", headers: { "Content-Type": "application/json", "Authorization": `Bearer ${API_KEY}` },
                body: JSON.stringify({ model: "deepseek-chat", messages: [{ role: "system", content: "你是布鲁斯·韦恩。对话中称呼她为Gabby。" }, { role: "user", content: text }] })
            });
            const data = await res.json(); document.getElementById(id).innerText = data.choices[0].message.content;
        } catch (e) { document.getElementById(id).innerText = "Bruce: 通讯受干扰。"; }
    }
    function post(type, text, id = "") {
        const flow = document.getElementById('chat-flow'); const d = document.createElement('div');
        d.className = `msg ${type}`; if(id) d.id = id;
        d.innerHTML = `<small style="display:block; opacity:0.3; font-size:0.6rem;">${new Date().toLocaleTimeString()}</small>${text}`;
        flow.appendChild(d); flow.scrollTop = flow.scrollHeight;
    }
    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
    document.getElementById('tDate').valueAsDate = new Date();
</script>
</body>
</html>
