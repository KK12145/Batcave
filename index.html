<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wayne Corp | Tactical Scheduler v7.0</title>
    <style>
        :root {
            --bg-base: #050505;
            --bg-grid: rgba(0, 255, 65, 0.05);
            --main-color: #00ff41; 
            --text-color: #00ff41;
            --panel-bg: rgba(0, 20, 0, 0.9);
            --border-color: #00ff41;
            --accent-glow: 0 0 15px rgba(0, 255, 65, 0.3);
            --bruce-comm: #888;
        }

        .theme-day {
            --bg-base: #e0e0e0;
            --bg-grid: rgba(0, 0, 0, 0.05);
            --main-color: #222;
            --text-color: #111;
            --panel-bg: rgba(255, 255, 255, 0.95);
            --border-color: #333;
            --accent-glow: 0 0 10px rgba(0, 0, 0, 0.1);
            --bruce-comm: #555;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-base);
            color: var(--text-color);
            font-family: 'Segoe UI', 'Courier New', monospace;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: linear-gradient(var(--bg-grid) 1px, transparent 1px), linear-gradient(90deg, var(--bg-grid) 1px, transparent 1px);
            background-size: 30px 30px;
            transition: all 0.5s;
        }

        #hud-interface {
            width: 95%;
            max-width: 1100px;
            display: flex;
            gap: 20px;
            z-index: 10;
        }

        /* 主面板 */
        .main-terminal {
            flex: 3;
            border: 2px solid var(--border-color);
            background: var(--panel-bg);
            box-shadow: var(--accent-glow);
            padding: 25px;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(10px);
        }

        .terminal-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        /* 任务输入区升级 */
        .input-section {
            background: rgba(255, 255, 255, 0.03);
            padding: 15px;
            border: 1px solid var(--border-color);
            margin-bottom: 20px;
        }

        .primary-input {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        input, select {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 10px;
            outline: none;
        }

        /* 次级调度面板 (Sub-menu) */
        .scheduling-options {
            display: flex;
            gap: 15px;
            font-size: 0.8rem;
            align-items: center;
            border-top: 1px dashed var(--border-color);
            padding-top: 10px;
            margin-top: 5px;
        }

        button {
            background: var(--main-color);
            color: var(--bg-base);
            border: none;
            padding: 8px 15px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
        }

        button:hover { filter: brightness(1.2); }

        /* 任务列表 */
        #task-list {
            flex: 1;
            overflow-y: auto;
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .task-card {
            background: rgba(255,255,255,0.03);
            border-left: 4px solid var(--main-color);
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } }

        .task-info strong { font-size: 1.1rem; }
        .schedule-badge {
            display: inline-block;
            background: var(--main-color);
            color: var(--bg-base);
            padding: 2px 6px;
            font-size: 0.65rem;
            font-weight: bold;
            margin-top: 5px;
            border-radius: 2px;
        }

        .next-date {
            font-size: 0.75rem;
            color: var(--main-color);
            opacity: 0.8;
            margin-top: 4px;
        }

        .delete-btn { color: #ff4444; cursor: pointer; font-size: 0.8rem; border: 1px solid #ff4444; padding: 3px 6px;}

    </style>
</head>
<body>

    <div id="hud-interface">
        <div class="main-terminal">
            <div class="terminal-header">
                <div>LOGGED AS: <span id="user-role">BATMAN</span></div>
                <div id="clock">00:00:00</div>
                <div>SECURE_LINE: <span style="color:red">●</span> ACTIVE</div>
            </div>

            <h2 style="text-align:center; letter-spacing: 5px;">MISSION SCHEDULER</h2>

            <div class="input-section">
                <div class="primary-input">
                    <input type="text" id="taskInput" placeholder="输入任务名称 (例如: 巡逻东区仓库)..." style="flex:3;">
                    <button onclick="deployTask()">部署任务</button>
                </div>
                
                <div class="scheduling-options">
                    <span>频率:</span>
                    <select id="freqSelect" onchange="toggleCustomDays()">
                        <option value="once">单次任务</option>
                        <option value="1">每天</option>
                        <option value="3">每3天 (标准周期)</option>
                        <option value="7">每周</option>
                        <option value="custom">自定义天数</option>
                    </select>
                    <input type="number" id="customDays" placeholder="天数" style="width:60px; display:none;" min="1">
                    <span>开始日期:</span>
                    <input type="date" id="startDate">
                </div>
            </div>

            <ul id="task-list"></ul>

            <div id="bruce-comm" style="margin-top: 15px; font-size: 0.85rem; color: var(--bruce-comm); font-style: italic;">
                Wayne: 正在同步卫星日历...
            </div>
        </div>
    </div>

    <script>
        // 设置默认日期为今天
        document.getElementById('startDate').valueAsDate = new Date();

        function toggleCustomDays() {
            const select = document.getElementById('freqSelect');
            const customInput = document.getElementById('customDays');
            customInput.style.display = (select.value === 'custom') ? 'inline-block' : 'none';
        }

        function deployTask() {
            const titleInput = document.getElementById('taskInput');
            const freqSelect = document.getElementById('freqSelect');
            const customDays = document.getElementById('customDays');
            const dateInput = document.getElementById('startDate');
            
            if (!titleInput.value) return;

            // 计算频率
            let freq = freqSelect.value;
            if (freq === 'custom') freq = customDays.value || 1;
            
            const list = document.getElementById('task-list');
            const li = document.createElement('li');
            li.className = 'task-card';

            const freqLabel = freq === 'once' ? 'ONCE' : `EVERY ${freq} DAYS`;
            
            // 计算下一次日期（如果是循环任务）
            let nextDeployStr = "Standby";
            if (freq !== 'once') {
                const start = new Date(dateInput.value);
                start.setDate(start.getDate() + parseInt(freq));
                nextDeployStr = start.toLocaleDateString();
            }

            li.innerHTML = `
                <div class="task-info">
                    <strong>${titleInput.value}</strong><br>
                    <span class="schedule-badge">${freqLabel}</span>
                    <div class="next-date">下次部署: ${nextDeployStr}</div>
                </div>
                <div class="delete-btn" onclick="this.parentElement.remove()">任务中止</div>
            `;

            list.prepend(li);
            
            // 重置与反馈
            titleInput.value = "";
            document.getElementById('bruce-comm').innerText = `Wayne: 任务已加入日历。循环周期：${freqLabel}。`;
        }

        // 基础系统功能
        function updateClock() {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }
        function updateTheme() {
            const hour = new Date().getHours();
            const isNight = hour >= 18 || hour < 6;
            document.body.classList.toggle('theme-day', !isNight);
            document.getElementById('user-role').innerText = isNight ? "BATMAN" : "BRUCE WAYNE";
        }

        setInterval(updateClock, 1000);
        setInterval(updateTheme, 60000);
        updateTheme();
        updateClock();
    </script>
</body>
</html>
