<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wayne OS | Mobile Terminal v23.0</title>
    <style>
        :root {
            --accent: #00ffff; --bg: #00050a; --dim: rgba(0, 255, 255, 0.15);
            --panel: rgba(0, 15, 30, 0.95); --urgent: #ff3333; --core: #ffaa00;
        }
        * { box-sizing: border-box; transition: 0.2s ease; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--accent); font-family: 'Inter', -apple-system, sans-serif; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        
        #bg-grid { position: absolute; width: 100%; height: 100%; background-image: radial-gradient(var(--dim) 1px, transparent 1px); background-size: 30px 30px; z-index: -1; }

        /* 顶部状态栏 */
        header { padding: 15px; border-bottom: 1px solid var(--dim); background: rgba(0,0,0,0.8); display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        .sys-title { font-size: 0.75rem; letter-spacing: 3px; font-weight: bold; }
        #clock { font-size: 0.9rem; font-weight: bold; text-shadow: 0 0 8px var(--accent); }

        /* 视图容器 */
        .view-container { flex: 1; position: relative; overflow: hidden; }
        .view { position: absolute; top: 0; left: 0; width: 100%; height: 100%; padding: 15px; overflow-y: auto; display: none; flex-direction: column; padding-bottom: 20px; }
        .view.active { display: flex; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h2 { font-size: 0.7rem; letter-spacing: 3px; border-bottom: 1px solid var(--dim); padding-bottom: 8px; margin-bottom: 15px; color: #fff; text-transform: uppercase; }

        /* 表单与按钮 */
        input, select, button { background: rgba(0, 255, 255, 0.05); border: 1px solid var(--dim); color: var(--accent); padding: 12px; font-size: 0.9rem; outline: none; margin-bottom: 15px; width: 100%; border-radius: 4px; appearance: none; }
        button { background: var(--accent); color: #000; font-weight: bold; cursor: pointer; border: none; letter-spacing: 1px; }
        button:active { transform: scale(0.98); }
        
        /* 任务卡片 (移动端适配) */
        .task-card { border: 1px solid var(--dim); border-left: 4px solid var(--accent); padding: 15px; background: rgba(0, 255, 255, 0.03); margin-bottom: 12px; border-radius: 4px; display: flex; flex-direction: column; gap: 8px; }
        .task-card.status-done { opacity: 0.4; border-left-color: #555; }
        .task-card.status-done .t-name { text-decoration: line-through; color: #aaa; }
        .task-card.pri-urgent { border-left-color: var(--urgent); }
        .task-card.pri-core { border-left-color: var(--core); }
        
        .t-header { display: flex; justify-content: space-between; font-size: 0.65rem; opacity: 0.6; }
        .t-name { font-weight: bold; font-size: 1rem; color: #fff; }
        .t-actions { display: flex; gap: 8px; margin-top: 5px; }
        .t-btn { flex: 1; padding: 6px; font-size: 0.65rem; text-align: center; border: 1px solid var(--accent); color: var(--accent); border-radius: 3px; }
        .t-btn.done { background: rgba(0, 255, 255, 0.1); }
        .t-btn.del { border-color: var(--urgent); color: var(--urgent); }

        /* 日历视图 */
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .cal-header button { width: auto; padding: 8px 15px; margin: 0; }
        .cal-container { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .cal-cell { border: 1px solid var(--dim); padding: 5px; min-height: 60px; font-size: 0.7rem; background: rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center; }
        .cal-cell.today { border-color: var(--accent); background: rgba(0, 255, 255, 0.1); }
        .cal-dot-container { display: flex; flex-wrap: wrap; gap: 2px; justify-content: center; margin-top: 4px; }
        .cal-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
        .cal-dot.urgent { background: var(--urgent); }

        /* 通讯视图 */
        #chat-flow { flex: 1; overflow-y: auto; padding-right: 5px; margin-bottom: 15px; display: flex; flex-direction: column; gap: 15px; }
        .msg { font-size: 0.85rem; line-height: 1.5; padding: 10px; border-radius: 6px; max-width: 85%; }
        .msg.bw { color: var(--accent); background: rgba(0, 255, 255, 0.05); align-self: flex-start; border-left: 2px solid var(--accent); }
        .msg.user { color: #fff; background: rgba(255, 255, 255, 0.1); align-self: flex-end; }
        .msg-ts { font-size: 0.6rem; opacity: 0.4; display: block; margin-bottom: 4px; }

        /* 底部导航栏 */
        nav { display: flex; border-top: 1px solid var(--dim); background: rgba(0,0,0,0.9); padding-bottom: env(safe-area-inset-bottom); z-index: 10; }
        .nav-btn { flex: 1; padding: 15px 0; text-align: center; font-size: 0.65rem; color: #555; font-weight: bold; letter-spacing: 1px; display: flex; flex-direction: column; gap: 4px; align-items: center; justify-content: center; }
        .nav-btn.active { color: var(--accent); background: rgba(0, 255, 255, 0.05); border-top: 2px solid var(--accent); }
    </style>
</head>
<body>

<div id="bg-grid"></div>

<header>
    <div class="sys-title">GABBY_OS v23 Mobile</div>
    <div id="clock">00:00:00</div>
</header>

<div class="view-container">
    <div id="view-ops" class="view active">
        <h2>ACTIVE_OPERATIONS</h2>
        <div id="tLogs" style="flex:1; overflow-y:auto;"></div>
        <button onclick="clearDone()" style="background:transparent; color:#666; border-color:#333; margin-top:10px;">CLEAR COMPLETED</button>
    </div>

    <div id="view-deploy" class="view">
        <h2 id="formTitle">DEPLOYMENT_PROTOCOL</h2>
        <input type="hidden" id="editId">
        <input type="text" id="tName" placeholder="Mission Name / 代号...">
        <input type="date" id="tDate">
        <select id="tPri">
            <option value="normal">Priority: NORMAL</option>
            <option value="core">Priority: CORE</option>
            <option value="urgent">Priority: URGENT</option>
        </select>
        <select id="tCycle" onchange="toggleCustom()">
            <option value="0">Cycle: SINGLE_EVENT</option>
            <option value="1">Cycle: DAILY</option>
            <option value="custom">Cycle: CUSTOM_DAYS</option>
        </select>
        <input type="number" id="tCustomVal" placeholder="输入循环天数 (如 7)..." style="display:none;">
        <button id="mainBtn" onclick="deploy()">EXECUTE DEPLOYMENT</button>
        <button onclick="resetForm()" style="background:transparent; color:#555; border:1px solid #333;">CANCEL</button>
    </div>

    <div id="view-cal" class="view">
        <div class="cal-header">
            <button onclick="changeMonth(-1)">&lt;</button>
            <h2 id="calMonthDisplay" style="margin:0; border:none;"></h2>
            <button onclick="changeMonth(1)">&gt;</button>
        </div>
        <div class="cal-container" id="calContainer"></div>
        <div style="margin-top:15px; font-size:0.6rem; opacity:0.5; text-align:center;">Dots indicate scheduled tasks (Red = Urgent)</div>
    </div>

    <div id="view-comms" class="view">
        <h2>SECURE_CHANNEL</h2>
        <div id="chat-flow"></div>
        <div style="display:flex; gap:10px; margin-top:10px;">
            <input type="text" id="uInput" placeholder="Report..." style="flex:1; margin:0;" onkeypress="if(event.key==='Enter') send()">
            <button onclick="send()" style="margin:0; width:70px; padding:0;">SEND</button>
        </div>
    </div>
</div>

<nav>
    <div class="nav-btn active" id="btn-ops" onclick="switchView('ops')"><span>OPS</span></div>
    <div class="nav-btn" id="btn-deploy" onclick="switchView('deploy')"><span>DEPLOY</span></div>
    <div class="nav-btn" id="btn-cal" onclick="switchView('cal')"><span>CAL</span></div>
    <div class="nav-btn" id="btn-comms" onclick="switchView('comms')"><span>COMMS</span></div>
</nav>

<script>
    const API_KEY = "sk-d10f68eb095e4a03aa4e33d697f269a0";
    const API_URL = "https://api.deepseek.com/chat/completions";
    
    let missions = JSON.parse(localStorage.getItem('gabby_v23_mobile')) || [];
    let currentCalDate = new Date();

    window.onload = () => { updateLogs(); post('bw', "Gabby，移动终端链路已建立。现在你可以随时随地接入哥谭的监控网了。"); };

    // 视图切换逻辑
    function switchView(mode) {
        document.querySelectorAll('.view, .nav-btn').forEach(el => el.classList.remove('active'));
        document.getElementById('view-' + mode).classList.add('active');
        document.getElementById('btn-' + mode).classList.add('active');
        if(mode === 'cal') renderCalendar();
        if(mode === 'ops') updateLogs();
    }

    function toggleCustom() { document.getElementById('tCustomVal').style.display = (document.getElementById('tCycle').value === 'custom') ? 'block' : 'none'; }

    // 任务CRUD逻辑
    function deploy() {
        const id = document.getElementById('editId').value;
        const name = document.getElementById('tName').value;
        const date = document.getElementById('tDate').value;
        const pri = document.getElementById('tPri').value;
        const cycle = document.getElementById('tCycle').value;
        const interval = (cycle === 'custom') ? parseInt(document.getElementById('tCustomVal').value) : parseInt(cycle);

        if(!name || !date) return alert("Missing Parameters");

        if(id) {
            const idx = missions.findIndex(m => m.id == id);
            missions[idx] = { ...missions[idx], name, date, pri, interval };
        } else {
            missions.push({ id: Date.now(), name, date, pri, interval, status: 'todo' });
        }
        
        localStorage.setItem('gabby_v23_mobile', JSON.stringify(missions));
        resetForm();
        switchView('ops'); // 部署完毕后自动跳回OPS大厅
    }

    function editTask(id) {
        const m = missions.find(x => x.id == id);
        document.getElementById('editId').value = m.id;
        document.getElementById('tName').value = m.name;
        document.getElementById('tDate').value = m.date;
        document.getElementById('tPri').value = m.pri;
        document.getElementById('tCycle').value = (m.interval > 1) ? 'custom' : m.interval;
        if(m.interval > 1) { document.getElementById('tCustomVal').value = m.interval; document.getElementById('tCustomVal').style.display = 'block'; }
        document.getElementById('formTitle').innerText = "EDIT_PROTOCOL";
        document.getElementById('mainBtn').innerText = "UPDATE";
        switchView('deploy'); // 自动跳转到部署界面
    }

    function toggleStatus(id) {
        const m = missions.find(x => x.id == id);
        m.status = (m.status === 'todo') ? 'done' : 'todo';
        localStorage.setItem('gabby_v23_mobile', JSON.stringify(missions));
        updateLogs();
    }

    function deleteTask(id) {
        if(confirm("Confirm Deletion?")) {
            missions = missions.filter(x => x.id != id);
            localStorage.setItem('gabby_v23_mobile', JSON.stringify(missions));
            updateLogs();
        }
    }

    function clearDone() { missions = missions.filter(m => m.status !== 'done'); localStorage.setItem('gabby_v23_mobile', JSON.stringify(missions)); updateLogs(); }

    function resetForm() {
        document.getElementById('editId').value = ""; document.getElementById('tName').value = "";
        document.getElementById('tDate').valueAsDate = new Date(); document.getElementById('tPri').value = "normal";
        document.getElementById('tCycle').value = "0"; document.getElementById('tCustomVal').style.display = 'none';
        document.getElementById('formTitle').innerText = "DEPLOYMENT_PROTOCOL"; document.getElementById('mainBtn').innerText = "EXECUTE DEPLOYMENT";
    }

    // 渲染OPS大厅列表
    function updateLogs() {
        const log = document.getElementById('tLogs');
        if(missions.length === 0) { log.innerHTML = "<div style='text-align:center; opacity:0.3; margin-top:50px;'>NO ACTIVE OBJECTIVES</div>"; return; }
        
        log.innerHTML = missions.slice().reverse().map(m => `
            <div class="task-card status-${m.status} pri-${m.pri}">
                <div class="t-header"><span>${m.date}</span><span>${m.interval > 0 ? 'CYCLE:'+m.interval+'D' : 'ONCE'}</span></div>
                <div class="t-name">${m.name}</div>
                <div class="t-actions">
                    <div class="t-btn done" onclick="toggleStatus(${m.id})">${m.status === 'todo' ? '✓ MARK DONE' : '↺ REVERT'}</div>
                    <div class="t-btn" onclick="editTask(${m.id})">EDIT</div>
                    <div class="t-btn del" onclick="deleteTask(${m.id})">DEL</div>
                </div>
            </div>
        `).join('');
    }

    // 日历模块 (移动端适配为圆点指示器)
    function changeMonth(dir) { currentCalDate.setMonth(currentCalDate.getMonth() + dir); renderCalendar(); }
    function renderCalendar() {
        const container = document.getElementById('calContainer'); const display = document.getElementById('calMonthDisplay');
        container.innerHTML = ""; const y = currentCalDate.getFullYear(); const m = currentCalDate.getMonth();
        display.innerText = `${y} / ${String(m+1).padStart(2,'0')}`;
        const first = new Date(y, m, 1).getDay(); const days = new Date(y, m+1, 0).getDate();
        
        for(let i=0; i<first; i++) container.appendChild(document.createElement('div'));
        for(let i=1; i<=days; i++) {
            const cur = `${y}-${String(m+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
            const dayMs = missions.filter(ms => {
                const start = new Date(ms.date); const cell = new Date(cur);
                if (cur === ms.date) return true;
                if (ms.interval > 0 && cell > start) return Math.round((cell-start)/86400000) % ms.interval === 0;
                return false;
            });
            const cell = document.createElement('div'); cell.className = `cal-cell ${cur === new Date().toISOString().split('T')[0] ? 'today' : ''}`;
            
            // 手机端因为空间有限，任务用彩色小圆点代替长文字
            const dots = dayMs.map(ms => `<div class="cal-dot ${ms.pri === 'urgent' ? 'urgent' : ''}" style="opacity:${ms.status==='done'?0.2:1}"></div>`).join('');
            cell.innerHTML = `<span>${i}</span><div class="cal-dot-container">${dots}</div>`;
            container.appendChild(cell);
        }
    }

    // 通讯模块
    async function send() {
        const input = document.getElementById('uInput'); const text = input.value.trim(); if(!text) return;
        post('user', text); input.value = ""; const id = "bw-" + Date.now(); post('bw', "Analyzing signal...", id);
        try {
            const res = await fetch(API_URL, {
                method: "POST", headers: { "Content-Type": "application/json", "Authorization": `Bearer ${API_KEY}` },
                body: JSON.stringify({ model: "deepseek-chat", messages: [{ role: "system", content: "你是布鲁斯·韦恩。Gabby正在使用移动端向你汇报。" }, { role: "user", content: text }] })
            });
            const data = await res.json(); document.getElementById(id).innerText = data.choices[0].message.content;
        } catch (e) { document.getElementById(id).innerText = "Bruce: 信号受损。"; }
    }
    function post(type, text, id = "") {
        const flow = document.getElementById('chat-flow'); const d = document.createElement('div');
        d.className = `msg ${type}`; if(id) d.id = id;
        d.innerHTML = `<span class="msg-ts">${new Date().toLocaleTimeString()}</span>${text}`;
        flow.appendChild(d); flow.scrollTop = flow.scrollHeight;
    }
    
    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
    document.getElementById('tDate').valueAsDate = new Date();
</script>
</body>
</html>
