<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bat Computer v14</title>
<style>
body{
  margin:0;
  background:#070a0f;
  color:#00f0ff;
  font-family:monospace;
  display:flex;
  height:100vh;
  overflow:hidden;
}
.panel{
  flex:1;
  padding:12px;
  border:1px solid rgba(0,255,255,0.08);
}
#center{
  text-align:center;
  display:flex;
  flex-direction:column;
  justify-content:center;
}
#clock{
  font-size:18px;
  opacity:0.8;
}
#chatBox{
  height:70vh;
  overflow:auto;
  border:1px solid rgba(0,255,255,0.15);
  padding:8px;
  background:rgba(0,0,0,0.3);
}
input,button{
  background:#000;
  color:#00f0ff;
  border:1px solid #00f0ff;
  padding:6px;
  margin-top:6px;
  width:100%;
}
.task{
  border-bottom:1px solid rgba(0,255,255,0.15);
  padding:4px 0;
}
.glow{
  text-shadow:0 0 10px #00f0ff;
}
.status{
  font-size:12px;
  opacity:0.7;
}
</style>
</head>
<body>

<div class="panel">
<h3 class="glow">TASK ENGINE</h3>
<input id="taskInput" placeholder="输入任务">
<button onclick="addTask()">ADD TASK</button>
<div id="tasks"></div>
</div>

<div class="panel" id="center">
<h2 class="glow">BAT SYSTEM v14</h2>
<div id="clock"></div>
<div class="status" id="status">SYSTEM ONLINE</div>
</div>

<div class="panel">
<h3 class="glow">ENCRYPTED COMMS</h3>
<div id="chatBox"></div>
<input id="userInput" placeholder="输入指令...">
<button onclick="sendMessage()">SEND</button>
</div>

<script>
// =========================
// EVENT BUS (v14核心升级)
// =========================
const EventBus = {
  events: {},
  on(event, fn){
    this.events[event] = this.events[event] || [];
    this.events[event].push(fn);
  },
  emit(event, data){
    (this.events[event]||[]).forEach(fn=>fn(data));
  }
};

// =========================
// CLOCK
// =========================
setInterval(()=>{
  document.getElementById('clock').innerText = new Date().toLocaleString();
},1000);

// =========================
// TASK SYSTEM (STATE MACHINE)
// =========================
let tasks = [];

function addTask(){
  const val = document.getElementById('taskInput').value;
  if(!val) return;

  const task = {
    id: Date.now(),
    title: val,
    status: 'PENDING'
  };

  tasks.push(task);
  renderTasks();
  EventBus.emit('TASK_CREATED', task);
}

function renderTasks(){
  const el = document.getElementById('tasks');
  el.innerHTML = '';

  tasks.forEach(t=>{
    const div = document.createElement('div');
    div.className='task';
    div.innerText = `[${t.status}] ${t.title}`;
    div.onclick = ()=>toggleTask(t.id);
    el.appendChild(div);
  });
}

function toggleTask(id){
  const t = tasks.find(x=>x.id===id);
  if(!t) return;
  t.status = t.status === 'DONE' ? 'PENDING' : 'DONE';
  renderTasks();
  EventBus.emit('TASK_UPDATED', t);
}

// =========================
// CHAT MEMORY (v14升级)
// =========================
let memory = [];

function logChat(role,msg){
  const box = document.getElementById('chatBox');
  box.innerHTML += `<div><b>${role}:</b> ${msg}</div>`;
  box.scrollTop = box.scrollHeight;

  memory.push({role,content:msg});
  if(memory.length>20) memory.shift();
}

// =========================
// AI BACKEND CALL (安全代理模式)
// =========================
async function sendMessage(){
  const input = document.getElementById('userInput');
  const msg = input.value;
  if(!msg) return;

  input.value='';
  logChat('YOU',msg);

  EventBus.emit('USER_MESSAGE', msg);

  const res = await fetch('/chat', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      messages:[
        {
          role:'system',
          content:'你是布鲁斯·韦恩（Batman），冷静、简短、战略性思考，会根据用户状态调整语气'
        },
        ...memory
      ]
    })
  });

  const data = await res.json();
  const reply = data.choices?.[0]?.message?.content || 'NO SIGNAL';

  logChat('BRUCE', reply);
  EventBus.emit('AI_RESPONSE', reply);
}

// =========================
// EVENT DRIVEN BEHAVIOR
// =========================
EventBus.on('TASK_CREATED', (t)=>{
  document.getElementById('status').innerText = 'NEW TASK REGISTERED';
});

EventBus.on('TASK_UPDATED', ()=>{
  document.getElementById('status').innerText = 'TASK STATE MODIFIED';
});

EventBus.on('USER_MESSAGE', (msg)=>{
  if(msg.includes('累')){
    document.getElementById('status').innerText = 'USER FATIGUE DETECTED';
  }
});

EventBus.on('AI_RESPONSE', ()=>{
  document.getElementById('status').innerText = 'COMMS ACTIVE';
});

</script>

</body>
</html>
