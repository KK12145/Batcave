<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bat-Computer | Comms Link v9.0</title>
    <style>
        :root {
            --main-color: #00ff41;
            --bg-dark: #020502;
            --panel-bg: rgba(0, 20, 0, 0.9);
            --border-glow: 0 0 15px rgba(0, 255, 65, 0.5);
            --text-dim: #006400;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-dark);
            color: var(--main-color);
            font-family: 'Consolas', 'Courier New', monospace;
            margin: 0;
            height: 100vh;
            display: flex;
            overflow: hidden;
            background-image: 
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%),
                linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 4px, 100% 100%;
        }

        /* 布局 */
        nav { width: 70px; border-right: 1px solid var(--main-color); display: flex; flex-direction: column; align-items: center; padding-top: 20px; gap: 20px; }
        .nav-icon { width: 40px; height: 40px; border: 1px solid var(--main-color); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 0.6rem; }
        
        main { flex: 1; display: grid; grid-template-columns: 280px 1fr 280px; gap: 15px; padding: 15px; position: relative; }

        .panel { 
            background: var(--panel-bg); 
            border: 1px solid var(--main-color); 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            box-shadow: var(--border-glow);
            position: relative;
        }

        /* 闪烁特效 - 用于新通讯消息 */
        @keyframes incoming-msg {
            0% { box-shadow: var(--border-glow); border-color: var(--main-color); }
            50% { box-shadow: 0 0 30px #00ff41; border-color: #fff; }
            100% { box-shadow: var(--border-glow); border-color: var(--main-color); }
        }
        .notif-active { animation: incoming-msg 1s ease 3; }

        h3 { font-size: 0.8rem; margin: 0 0 10px 0; border-bottom: 1px solid var(--main-color); padding-bottom: 5px; opacity: 0.8; }

        /* 日历与任务 */
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; font-size: 0.6rem; text-align: center; }
        .cal-day { border: 1px solid var(--text-dim); padding: 3px; }
        .today { background: var(--main-color); color: black; }

        .task-card { border: 1px solid var(--text-dim); padding: 10px; margin-bottom: 10px; font-size: 0.85rem; background: rgba(0,255,65,0.02); }

        /* 沟通系统核心 */
        #bruce-comms {
            font-size: 0.9rem;
            line-height: 1.5;
            color: #eee;
            min-height: 100px;
        }
        .comms-timestamp { font-size: 0.6rem; color: var(--main-color); display: block; margin-bottom: 8px; }

        /* 输入区 */
        input, select, button { background: transparent; border: 1px solid var(--main-color); color: var(--main-color); padding: 8px; font-family: inherit; }
        button { cursor: pointer; background: var(--main-color); color: black; font-weight: bold; }
        button:hover { background: #fff; }

        .bat-logo { position: absolute; bottom: 10px; right: 10px; width: 100px; opacity: 0.05; pointer-events: none; }
    </style>
</head>
<body>

<nav>
    <div class="nav-icon">HUD</div>
    <div class="nav-icon" style="background:var(--main-color); color:black;">TASK</div>
    <div class="nav-icon">COM</div>
</nav>

<main>
    <section>
        <div class="panel">
            <h3>Calendar View</h3>
            <div class="cal-grid" id="calendar"></div>
        </div>
        <div class="panel" style="margin-top:15px; flex:1;">
            <h3>Active Objective</h3>
            <div id="today-task">> Waiting for deployment...</div>
        </div>
    </section>

    <section class="panel">
        <h3>Mission Control</h3>
        <div style="display:flex; gap:10px; margin-bottom:15px;">
            <input type="text" id="taskInput" placeholder="New Command..." style="flex:1;">
            <select id="freqSelect">
                <option value="once">Once</option>
                <option value="3">3 Days</option>
            </select>
            <button onclick="deploy()">DEPLOY</button>
        </div>
        <div id="taskList" style="overflow-y:auto; flex:1;"></div>
    </section>

    <section class="panel" id="comms-panel">
        <h3>Encrypted Comms (B.W.)</h3>
        <div id="bruce-comms">
            <span class="comms-timestamp">[SYSTEM START]</span>
            加载中... 链接已建立。
        </div>
        <div style="margin-top:auto; font-size:0.6rem; color:var(--text-dim);">
            > 信号强度: 稳定<br>
            > 来源: 韦恩庄园加密频道
        </div>
    </section>

    <img src="https://upload.wikimedia.org/wikipedia/commons/c/ce/Batman_Logo.svg" class="bat-logo">
</main>

<script>
    // 沟通语句库
    const commsBank = [
        "你需要休息，凯恩。过度疲劳是致命的。",
        "哥谭的夜晚很长，确保你的计划没有漏洞。",
        "阿福问你什么时候回来吃饭。我也想知道答案。",
        "我在监视小丑的动向，你专注于你的任务。",
        "如果你遇到了麻烦，记得按下紧急按钮。",
        "做得不错，保持这个节奏。",
        "不要让情绪干扰你的判断。冷静下来。",
        "这件任务完成后，去睡一觉，这是命令。",
        "我正在查阅你上传的数据，非常出色。",
        "你不是一个人在战斗。永远记得这一点。"
    ];

    // 初始化日历
    function initCal() {
        const cal = document.getElementById('calendar');
        const now = new Date();
        const days = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
        for(let i=1; i<=days; i++) {
            const d = document.createElement('div');
            d.className = i === now.getDate() ? 'cal-day today' : 'cal-day';
            d.innerText = i;
            cal.appendChild(d);
        }
    }

    // 自动通讯逻辑
    function autoComms() {
        const panel = document.getElementById('comms-panel');
        const commsBox = document.getElementById('bruce-comms');
        const time = new Date().toLocaleTimeString();
        const msg = commsBank[Math.floor(Math.random() * commsBank.length)];

        // 触发视觉通知
        panel.classList.remove('notif-active');
        void panel.offsetWidth; // 触发重绘
        panel.classList.add('notif-active');

        commsBox.innerHTML = `
            <span class="comms-timestamp">[INCOMING - ${time}]</span>
            Wayne: "${msg}"
        `;
    }

    function deploy() {
        const input = document.getElementById('taskInput');
        const list = document.getElementById('taskList');
        const focus = document.getElementById('today-task');
        if(!input.value) return;

        const card = document.createElement('div');
        card.className = 'task-card';
        card.innerHTML = `> ${input.value} <span style="float:right; cursor:pointer;" onclick="this.parentElement.remove()">[X]</span>`;
        list.prepend(card);

        focus.innerHTML = `> CURRENT: ${input.value}<br>> STATUS: EN ROUTE`;
        
        // 部署后触发布鲁斯即时反馈
        setTimeout(() => {
            const commsBox = document.getElementById('bruce-comms');
            commsBox.innerHTML = `
                <span class="comms-timestamp">[SYSTEM - FEEDBACK]</span>
                Wayne: "任务已确认。我会全程监控进度。"
            `;
        }, 500);

        input.value = "";
    }

    initCal();
    // 初始延迟 3秒发第一条，之后每 30-60秒随机发送一条关心语句
    setTimeout(autoComms, 3000);
    setInterval(autoComms, Math.random() * 30000 + 30000);
</script>

</body>
</html>
