<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wayne OS | Terminal</title>
    <style>
        :root {
            --accent: #00ff41;
            --bg: #050505;
            --dim: #003311;
        }

        body {
            background: var(--bg);
            color: var(--accent);
            font-family: 'Inter', 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            letter-spacing: 1px;
        }

        /* 动态点阵背景 */
        body::before {
            content: "";
            position: absolute;
            width: 100%; height: 100%;
            background-image: radial-gradient(var(--dim) 1px, transparent 1px);
            background-size: 25px 25px;
            opacity: 0.3;
            z-index: -1;
        }

        /* 呼吸蝙蝠标志 */
        .bat-logo {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            opacity: 0.05;
            filter: invert(1);
            animation: breathe 5s infinite ease-in-out;
            pointer-events: none;
        }

        @keyframes breathe {
            0%, 100% { opacity: 0.03; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.08; transform: translate(-50%, -50%) scale(1.05); }
        }

        /* 布局 */
        #container {
            display: grid;
            grid-template-columns: 350px 1fr 350px;
            width: 100%;
            padding: 40px;
            gap: 40px;
            z-index: 1;
        }

        section { display: flex; flex-direction: column; gap: 20px; }
        .glass-panel { background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(10px); padding: 20px; border-left: 1px solid var(--accent); }

        h2 { font-size: 0.7rem; text-transform: uppercase; margin: 0 0 15px 0; opacity: 0.6; }

        /* 任务设置增强 */
        .input-row { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        input, select, button {
            background: rgba(0, 255, 65, 0.05);
            border: 1px solid var(--dim);
            color: var(--accent);
            padding: 12px;
            font-size: 0.8rem;
            outline: none;
        }
        button { background: var(--accent); color: black; font-weight: bold; cursor: pointer; border: none; }
        button:hover { background: white; }

        /* 列表显示 */
        .task-item {
            border-bottom: 1px solid var(--dim);
            padding: 10px 0;
            font-size: 0.85rem;
            display: flex;
            justify-content: space-between;
        }

        /* 沟通系统 (Chat) */
        #chat-window {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            font-size: 0.85rem;
            padding-right: 10px;
        }
        .msg { margin-bottom: 10px; line-height: 1.4; }
        .msg.bw { color: var(--accent); }
        .msg.me { color: #fff; text-align: right; }
        .timestamp { font-size: 0.6rem; opacity: 0.5; display: block; }

        #reply-input { margin-top: 10px; }

        /* 滚动条 */
        ::-webkit-scrollbar { width: 2px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); }
    </style>
</head>
<body>

    <img src="https://upload.wikimedia.org/wikipedia/commons/c/ce/Batman_Logo.svg" class="bat-logo">

    <div id="container">
        <section class="glass-panel">
            <h2>Tactical Scheduling</h2>
            <div class="input-row">
                <input type="text" id="taskName" placeholder="任务代号...">
                <div style="display:flex; gap:5px;">
                    <input type="date" id="taskDate" style="flex:1;">
                    <select id="taskPriority" style="width:80px;">
                        <option value="!">低</option>
                        <option value="!!">中</option>
                        <option value="!!!">高</option>
                    </select>
                </div>
                <select id="taskFreq">
                    <option value="once">单次部署</option>
                    <option value="1">每日循环</option>
                    <option value="3">3日巡检</option>
                    <option value="7">每周例行</option>
                </select>
                <button onclick="deployTask()">DEPLOY MISSION</button>
            </div>
            <h2>Active Feed</h2>
            <div id="taskList"></div>
        </section>

        <section style="justify-content: center; align-items: center; border:none;">
            <div style="text-align: center; opacity: 0.4; font-size: 0.7rem;">
                <p>GOTHAM CITY SURVEILLANCE SYSTEM</p>
                <p id="liveTime">00:00:00</p>
            </div>
        </section>

        <section class="glass-panel">
            <h2>Encrypted Comms (B.W.)</h2>
            <div id="chat-window">
                <div class="msg bw">
                    <span class="timestamp">02:30 AM</span>
                    Bruce: 链接已建立。凯恩，报告你的当前状态。
                </div>
            </div>
            <div style="display:flex; gap:5px;">
                <input type="text" id="replyText" placeholder="回复布鲁斯..." style="flex:1;" onkeypress="if(event.key==='Enter') sendReply()">
                <button onclick="sendReply()" style="padding:0 15px;">SEND</button>
            </div>
        </section>
    </div>

<script>
    // 布鲁斯的台词库
    const bwResponses = [
        "收到。保持专注，不要被琐事干扰。",
        "哥谭不需要英雄，需要结果。继续努力。",
        "如果压力太大，去阿福那里喝杯茶。这是指令。",
        "我会处理掉外围的麻烦。你专注于眼前的目标。",
        "做得很好。蝙蝠洞的数据正在同步。"
    ];

    // 更新时间
    setInterval(() => {
        document.getElementById('liveTime').innerText = new Date().toLocaleTimeString();
    }, 1000);

    // 部署任务
    function deployTask() {
        const name = document.getElementById('taskName');
        const date = document.getElementById('taskDate');
        const prio = document.getElementById('taskPriority');
        const list = document.getElementById('taskList');

        if(!name.value) return;

        const item = document.createElement('div');
        item.className = 'task-item';
        item.innerHTML = `
            <span>${prio.value} ${name.value}</span>
            <span style="opacity:0.5">${date.value.split('-').slice(1).join('/')}</span>
        `;
        list.prepend(item);
        
        addMessage('bw', "任务已载入主板。我会实时追踪。");
        name.value = "";
    }

    // 发送回复
    function sendReply() {
        const input = document.getElementById('replyText');
        const text = input.value.trim();
        if(!text) return;

        addMessage('me', text);
        input.value = "";

        // 模拟布鲁斯延迟回复
        setTimeout(() => {
            const reply = bwResponses[Math.floor(Math.random() * bwResponses.length)];
            addMessage('bw', `Bruce: ${reply}`);
        }, 1500);
    }

    function addMessage(sender, text) {
        const window = document.getElementById('chat-window');
        const msgDiv = document.createElement('div');
        const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        msgDiv.className = `msg ${sender}`;
        msgDiv.innerHTML = `<span class="timestamp">${time}</span>${text}`;
        window.appendChild(msgDiv);
        window.scrollTop = window.scrollHeight;
    }

    // 初始随机通讯
    setInterval(() => {
        if(Math.random() > 0.7) {
            addMessage('bw', "Bruce: " + bwResponses[Math.floor(Math.random() * bwResponses.length)]);
        }
    }, 60000);
</script>
</body>
</html>
